<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MirrorAgent HUD</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent !important; overflow: hidden; border: none; outline: none; -webkit-app-region: drag; }
      #root { width: 100%; height: 100%; background: transparent; display: flex; align-items: stretch; }
      * { box-sizing: border-box; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.45); opacity: 0.6; }
      }
      .dot-pulse { animation: pulse 1.8s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
